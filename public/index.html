<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar — Hotel Intelligence Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            /* ═══ LIGHT THEME (Default) ═══ */
            --bg-app: #f8fafc;
            --bg-sidebar: #ffffff;
            --bg-card: #ffffff;
            --bg-card-hover: #f1f5f9;
            --text-main: #0f172a;
            --text-dim: #334155;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --border-hover: #cbd5e1;
            
            --accent-primary: #6366f1; /* Indigo */
            --accent-emerald: #10b981;
            --accent-gold: #f59e0b;
            --accent-rose: #f43f5e;
            
            --site-booking: #003580;
            --site-agoda: #5542f6;
            --site-expedia: #fbcb33;
            --site-hotels: #d32f2f;
            --site-tripadvisor: #34e0a1;

            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
            --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-heading: 'Outfit', sans-serif;
        }

        /* ═══ DARK MODE CLASS (Optional Switch) ═══ */
        .dark-mode {
            --bg-app: #0b0f19;
            --bg-sidebar: #111827;
            --bg-card: #1f2937;
            --bg-card-hover: #2d3748;
            --text-main: #f8fafc;
            --text-dim: #cbd5e1;
            --text-muted: #64748b;
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg-app); 
            color: var(--text-main); 
            font-family: var(--font-main); 
            overflow-x: hidden;
            transition: background 0.3s ease;
        }

        .app { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }

        /* ═══ SIDEBAR ═══ */
        .sidebar {
            background: var(--bg-sidebar); border-right: 1px solid var(--border);
            padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 2rem;
            position: sticky; top: 0; height: 100vh; overflow-y: auto;
        }
        .brand { display: flex; align-items: center; gap: 0.75rem; }
        .brand-logo { 
            width: 40px; height: 40px; background: var(--accent-primary); 
            border-radius: 12px; display: grid; place-items: center; color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        .brand h1 { font-family: var(--font-heading); font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }

        .nav-label { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1.5px; margin-bottom: 0.75rem; display: block; }
        .nav-card { background: rgba(0,0,0,0.02); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1.25rem; }
        .dark-mode .nav-card { background: rgba(255,255,255,0.03); }

        .hotel-selector-styled select {
            width: 100%; background: transparent; border: none; font-family: var(--font-main);
            font-weight: 700; color: var(--text-main); font-size: 0.9rem; outline: none; cursor: pointer;
        }

        /* ═══ MAIN CONTENT ═══ */
        .main-content { padding: 2.5rem; display: flex; flex-direction: column; gap: 2rem; }

        /* Stats */
        .stats-overview { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
            padding: 1.5rem; position: relative; overflow: hidden; box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--border-hover); }
        .stat-card .val { font-size: 1.75rem; font-weight: 800; color: var(--text-main); font-family: var(--font-heading); margin: 0.5rem 0; }
        .stat-card .lab { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }
        .stat-card .icon-box { 
            width: 38px; height: 38px; border-radius: 10px; background: rgba(99, 102, 241, 0.1);
            color: var(--accent-primary); display: grid; place-items: center; margin-bottom: 0.5rem;
        }
        .stat-card.primary { border-left: 4px solid var(--accent-primary); }
        .stat-card.gold { border-left: 4px solid var(--accent-gold); }
        .stat-card.gold .icon-box { background: rgba(245, 158, 11, 0.1); color: var(--accent-gold); }
        .stat-card.emerald { border-left: 4px solid var(--accent-emerald); }
        .stat-card.emerald .icon-box { background: rgba(16, 185, 129, 0.1); color: var(--accent-emerald); }

        /* Panels */
        .panel { 
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); 
            padding: 1.8rem; box-shadow: var(--shadow-sm);
        }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .panel-title { display: flex; align-items: center; gap: 0.75rem; font-weight: 800; font-family: var(--font-heading); font-size: 1.1rem; }
        .panel-title i { color: var(--accent-primary); }

        .dashboard-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 1.5rem; }

        /* Scrape Buttons */
        .scrape-options { display: flex; flex-direction: column; gap: 0.8rem; }
        .scrape-btn {
            background: var(--bg-app); border: 1px solid var(--border); color: var(--text-main);
            padding: 0.85rem 1.25rem; border-radius: 12px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between; transition: var(--transition);
            font-family: var(--font-main);
        }
        .scrape-btn:hover { background: var(--bg-card-hover); border-color: var(--border-hover); }
        .scrape-btn.primary { background: var(--accent-primary); border-color: var(--accent-primary); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25); }
        .scrape-btn.primary:hover { background: #4f46e5; transform: translateY(-2px); }
        .scrape-btn.running i { animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Site Pills */
        .site-pills { display: flex; flex-wrap: wrap; gap: 0.6rem; }
        .site-pill {
            padding: 0.5rem 1rem; border-radius: 50px; background: var(--bg-app);
            border: 1px solid var(--border); font-size: 0.75rem; font-weight: 700;
            cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 0.6rem;
            color: var(--text-dim);
        }
        .site-pill.active { border-color: var(--accent-primary); background: rgba(99, 102, 241, 0.08); color: var(--accent-primary); }
        .site-pill .dot { width: 8px; height: 8px; border-radius: 50%; }

        /* Review Feed */
        .feed-container { display: flex; flex-direction: column; gap: 1.5rem; }
        .feed-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
        .search-box { position: relative; flex: 1; }
        .search-box input {
            width: 100%; background: var(--bg-app); border: 1px solid var(--border);
            border-radius: 14px; padding: 0.75rem 1rem 0.75rem 2.8rem;
            color: var(--text-main); font-family: var(--font-main); font-size: 0.88rem; outline: none;
            transition: var(--transition);
        }
        .search-box input:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        .search-box i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 18px; }

        .reviews-list { 
            display: grid; grid-template-columns: 1fr; gap: 1rem; 
            max-height: 700px; overflow-y: auto; padding-right: 0.5rem;
        }
        .reviews-list::-webkit-scrollbar { width: 6px; }
        .reviews-list::-webkit-scrollbar-track { background: transparent; }
        .reviews-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .review-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 1.5rem; transition: var(--transition);
        }
        .review-card:hover { border-color: var(--border-hover); box-shadow: var(--shadow-sm); }
        .review-top { display: flex; justify-content: space-between; margin-bottom: 1rem; }
        .reviewer-info { display: flex; align-items: center; gap: 1rem; }
        .avatar { 
            width: 44px; height: 44px; border-radius: 12px; background: rgba(99, 102, 241, 0.1);
            color: var(--accent-primary); display: grid; place-items: center; font-weight: 800; font-family: var(--font-heading);
        }
        .name-meta h4 { font-size: 0.95rem; font-weight: 700; color: var(--text-main); }
        .name-meta span { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; }
        .rating-badge { padding: 0.4rem 0.7rem; background: rgba(245, 158, 11, 0.1); color: var(--accent-gold); border-radius: 10px; font-weight: 800; font-size: 1rem; }

        .review-content h5 { font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; }
        .review-content p { color: var(--text-dim); line-height: 1.7; font-size: 0.9rem; }
        .review-footer { display: flex; align-items: center; gap: 1.5rem; margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--border); }
        .meta-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: var(--text-muted); font-weight: 600; }
        .site-tag { padding: 0.25rem 0.6rem; border-radius: 6px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-left: auto; }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px);
            display: none; place-items: center; z-index: 1000; animation: fadeIn 0.15s ease-out;
        }
        .modal {
            background: var(--bg-card); border-radius: var(--radius-lg); padding: 2.5rem;
            width: 100%; max-width: 440px; box-shadow: var(--shadow-lg); animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-header { margin-bottom: 1.5rem; }
        .modal-title { font-family: var(--font-heading); font-size: 1.5rem; font-weight: 800; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem; }

        .btn-cancel { background: none; border: 1px solid var(--border); padding: 0.75rem 1.5rem; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .btn-cancel:hover { background: var(--bg-app); }

        /* Action Buttons */
        .btn-add-hotel {
            width: 100%; margin-top: 1rem; padding: 0.75rem; border-radius: 10px;
            background: rgba(99, 102, 241, 0.05); color: var(--accent-primary);
            border: 1px dashed var(--accent-primary); font-weight: 700; cursor: pointer;
            transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn-add-hotel:hover { background: rgba(99, 102, 241, 0.1); }

        .action-link { background: none; border: none; color: var(--accent-primary); font-size: 0.75rem; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
        .action-link:hover { text-decoration: underline; }

        /* Responsive */
        @media (max-width: 1200px) {
            .app { grid-template-columns: 1fr; }
            .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
            .stats-overview { grid-template-columns: repeat(2, 1fr); }
            .dashboard-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- ═══ SIDEBAR ═══ -->
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-logo"><i data-lucide="layout-dashboard"></i></div>
                <h1>Stellar</h1>
                <button id="themeToggle" style="margin-left: auto; background: none; border: none; cursor: pointer; color: var(--text-muted);"><i data-lucide="sun"></i></button>
            </div>

            <div class="nav-card">
                <span class="nav-label">Properties</span>
                <div class="hotel-selector-styled" style="margin-bottom: 0.5rem;">
                    <select id="hotelPresetSelector">
                        <option value="">-- Select Property --</option>
                    </select>
                </div>
                <button class="btn-add-hotel" id="openAddHotelModal">
                    <i data-lucide="plus-circle" style="width: 14px;"></i> Add Property
                </button>
            </div>

            <div id="sidebarHistory" class="nav-card" style="display: none; flex: 1; overflow-y: auto;">
                <span class="nav-label">Scrape History</span>
                <div id="lastScrapedInfo" style="font-size: 0.72rem; color: var(--text-dim); line-height: 1.5;"></div>
            </div>

            <div class="nav-card" style="margin-top: auto;">
                <span class="nav-label">System</span>
                <div style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; font-weight: 700;">
                    <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--accent-emerald); box-shadow: 0 0 8px rgba(16,185,129,0.3);"></span>
                    Ready
                </div>
            </div>
        </aside>

        <div class="modal-overlay" id="addHotelModal">
            <div class="modal">
                <div class="modal-header">
                    <h2 class="modal-title">New Property</h2>
                    <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 0.25rem;">Create a profile to start tracking a new hotel.</p>
                </div>
                <div class="input-group">
                    <label class="nav-label">Hotel Name</label>
                    <input type="text" id="newHotelName" placeholder="e.g. Grand Plaza Cairo">
                </div>
                <div class="modal-footer">
                    <button class="btn-cancel" id="closeAddHotelModal">Cancel</button>
                    <button class="scrape-btn primary" id="saveNewHotel" style="width:80px; padding: 0.6rem;">Create</button>
                </div>
            </div>
        </div>

        <main class="main-content">
            <!-- Stats -->
            <section class="stats-overview">
                <div class="stat-card primary">
                    <div class="icon-box"><i data-lucide="database"></i></div>
                    <div class="val" id="totalCount">0</div>
                    <div class="lab">Total Reviews</div>
                </div>
                <div class="stat-card gold">
                    <div class="icon-box"><i data-lucide="star"></i></div>
                    <div class="val" id="avgRating">0.0</div>
                    <div class="lab">Est. Avg Rating</div>
                </div>
                <div class="stat-card emerald">
                    <div class="icon-box"><i data-lucide="trending-up"></i></div>
                    <div class="val" id="growthCount">0</div>
                    <div class="lab">New Growth</div>
                </div>
                <div class="stat-card">
                    <div class="icon-box"><i data-lucide="layers"></i></div>
                    <div class="val" id="activeSitesCount">0</div>
                    <div class="lab">Sources</div>
                </div>
            </section>

            <div class="dashboard-row">
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title"><i data-lucide="pie-chart"></i> Distribution</div>
                    </div>
                    <div style="height: 220px;"><canvas id="distributionChart"></canvas></div>
                </div>

                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title"><i data-lucide="zap"></i> Operations</div>
                    </div>
                    <div class="scrape-options">
                        <button class="scrape-btn primary" id="btnScrapeAll">Deep Scrape <i data-lucide="arrow-right"></i></button>
                        <button class="scrape-btn" id="btnScrapeNew">Smart Sync <i data-lucide="refresh-cw"></i></button>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:0.5rem; margin-top:0.5rem;">
                            <input type="date" id="dateFrom" style="background:var(--bg-app); border:1px solid var(--border); border-radius:6px; padding:0.4rem; font-size:0.75rem; color:var(--text-main);">
                            <input type="date" id="dateTo" style="background:var(--bg-app); border:1px solid var(--border); border-radius:6px; padding:0.4rem; font-size:0.75rem; color:var(--text-main);">
                        </div>
                    </div>
                    <div style="margin-top: 1.5rem;">
                        <span class="nav-label">Enabled Sources</span>
                        <div class="site-pills" id="siteSelector">
                            <div class="site-pill active"><input type="checkbox" value="booking" checked style="display:none"><span class="dot" style="background:var(--site-booking)"></span> Booking</div>
                            <div class="site-pill active"><input type="checkbox" value="agoda" checked style="display:none"><span class="dot" style="background:var(--site-agoda)"></span> Agoda</div>
                            <div class="site-pill active"><input type="checkbox" value="expedia" checked style="display:none"><span class="dot" style="background:var(--site-expedia)"></span> Expedia</div>
                            <div class="site-pill active"><input type="checkbox" value="hotels" checked style="display:none"><span class="dot" style="background:var(--site-hotels)"></span> Hotels</div>
                            <div class="site-pill active"><input type="checkbox" value="tripadvisor" checked style="display:none"><span class="dot" style="background:var(--site-tripadvisor)"></span> TripAdvisor</div>
                        </div>
                    </div>
                </div>
            </div>

            <section class="feed-container">
                <div class="feed-header">
                    <div class="panel-title"><i data-lucide="activity"></i> Intel Feed</div>
                    <div class="search-box">
                        <i data-lucide="search"></i>
                        <input type="text" id="reviewSearch" placeholder="Search keywords...">
                    </div>
                    <button class="scrape-btn" id="exportCsv" style="width: auto; padding: 0.5rem 1rem; font-size: 0.75rem;">Export CSV <i data-lucide="download"></i></button>
                </div>
                <!-- INNER SCROLL CONTAINER -->
                <div class="reviews-list" id="reviewsList">
                    <div class="panel" style="text-align: center; padding: 4rem; border: dashed 2px var(--border);">
                        <i data-lucide="coffee" style="width:40px; color:var(--text-muted); margin-bottom:1rem;"></i>
                        <p style="color:var(--text-dim);">No data selected.</p>
                    </div>
                </div>
            </section>

            <section id="hotelSettingsSection" class="panel" style="display: none; margin-top: 1rem;">
                <div class="panel-header">
                    <div class="panel-title"><i data-lucide="link-2"></i> URL Config</div>
                    <button class="scrape-btn primary" id="btnSaveUrls" style="width: auto; padding: 0.5rem 1.25rem;">Sync URLs</button>
                </div>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem;">
                    <div class="input-group"><label class="nav-label">Booking</label><input type="text" id="url-booking"></div>
                    <div class="input-group"><label class="nav-label">Agoda</label><input type="text" id="url-agoda"></div>
                    <div class="input-group"><label class="nav-label">Expedia</label><input type="text" id="url-expedia"></div>
                    <div class="input-group"><label class="nav-label">Hotels</label><input type="text" id="url-hotels"></div>
                    <div class="input-group"><label class="nav-label">Tripadvisor</label><input type="text" id="url-tripadvisor"></div>
                </div>
            </section>
        </main>
        </main>
    </div>

    <script>
        const socket = io();
        let sessionNewCount = 0;
        let isRunning = false;
        let currentHotel = '';
        let allReviews = [];
        let chartInstance = null;
        let allHotels = {};

        const siteColors = { booking:'#003580', agoda:'#5542f6', expedia:'#fbcb33', hotels:'#d32f2f', tripadvisor:'#34e0a1' };
        const siteLabels = { booking:'Booking', agoda:'Agoda', expedia:'Expedia', hotels:'Hotels', tripadvisor:'Tripadvisor' };

        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        lucide.createIcons();

        // Theme Toggle
        let isDarkMode = false;
        $('#themeToggle').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode', isDarkMode);
            $('#themeToggle').innerHTML = isDarkMode ? `<i data-lucide="moon"></i>` : `<i data-lucide="sun"></i>`;
            lucide.createIcons();
            if (chartInstance) renderChart(allReviews);
        });

        // Hotel Management
        async function loadHotels() {
            try {
                const res = await fetch('/api/hotels');
                allHotels = await res.json();
                const selector = $('#hotelPresetSelector');
                const cur = selector.value;
                selector.innerHTML = '<option value="">-- Select Property --</option>';
                Object.keys(allHotels).sort().forEach(h => {
                    const opt = document.createElement('option');
                    opt.value = h; opt.textContent = h;
                    if (h === cur) opt.selected = true;
                    selector.appendChild(opt);
                });
            } catch (e) {}
        }
        loadHotels();

        $('#hotelPresetSelector').addEventListener('change', (e) => {
            const h = e.target.value;
            if (!h) { resetUI(); return; }
            $('#hotelSettingsSection').style.display = 'block';
            $('#sidebarHistory').style.display = 'block';
            syncContext(h);
        });

        const modal = $('#addHotelModal');
        $('#openAddHotelModal').addEventListener('click', () => modal.style.display = 'grid');
        $('#closeAddHotelModal').addEventListener('click', () => modal.style.display = 'none');
        $('#saveNewHotel').addEventListener('click', async () => {
            const name = $('#newHotelName').value.trim();
            if (!name) return;
            const res = await fetch('/api/hotels/add', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ hotelName: name }) });
            if (res.ok) {
                await loadHotels();
                modal.style.display = 'none';
                $('#hotelPresetSelector').value = name;
                $('#hotelPresetSelector').dispatchEvent(new Event('change'));
            }
        });

        async function syncContext(name) {
            currentHotel = name;
            const urls = allHotels[name] || {};
            ['booking', 'agoda', 'expedia', 'hotels', 'tripadvisor'].forEach(s => $(`#url-${s}`).value = urls[s] || '');
            
            $('#reviewsList').innerHTML = '<p style="text-align:center;padding:2rem;">Fetching Intelligence...</p>';
            socket.emit('get_state', { hotelName: name });
            const res = await fetch(`/api/all-reviews?hotel=${encodeURIComponent(name)}`);
            allReviews = await res.json();
            renderReviews(allReviews);
            updateStats(allReviews);
            renderChart(allReviews);
        }

        function resetUI() {
            currentHotel = '';
            $('#hotelSettingsSection').style.display = 'none';
            $('#sidebarHistory').style.display = 'none';
            $('#reviewsList').innerHTML = '<p style="text-align:center;padding:2rem;color:var(--text-muted);">No property active.</p>';
        }

        // Search & Filter
        $('#reviewSearch').addEventListener('input', (e) => {
            const t = e.target.value.toLowerCase();
            const f = allReviews.filter(r => (r.reviewerName||'').toLowerCase().includes(t) || (r.reviewText||'').toLowerCase().includes(t));
            renderReviews(f);
        });

        function renderReviews(data) {
            const list = $('#reviewsList');
            if (!data.length) { list.innerHTML = '<p style="text-align:center;padding:2rem;">No data found.</p>'; return; }
            list.innerHTML = '';
            data.sort((a,b) => new Date(b.date||0) - new Date(a.date||0)).forEach(r => {
                const div = document.createElement('div');
                div.className = 'review-card';
                div.innerHTML = `
                    <div class="review-top">
                        <div class="reviewer-info">
                            <div class="avatar">${(r.reviewerName||'G')[0]}</div>
                            <div class="name-meta"><h4>${r.reviewerName||'Guest'}</h4><span>${r.date||''}</span></div>
                        </div>
                        <div class="rating-badge">${r.rating||'--'}</div>
                    </div>
                    <div class="review-content"><p>${r.reviewText||'---'}</p></div>
                    <div class="review-footer">
                        <div class="site-tag" style="background:${siteColors[r.site]};color:white;">${r.site}</div>
                    </div>
                `;
                list.appendChild(div);
            });
            lucide.createIcons();
        }

        function updateStats(data) {
            $('#totalCount').textContent = data.length;
            const r = data.map(x => parseFloat(x.rating)).filter(n => !isNaN(n));
            $('#avgRating').textContent = r.length ? (r.reduce((a,b)=>a+b,0)/r.length).toFixed(1) : '0.0';
            $('#activeSitesCount').textContent = new Set(data.map(x => x.site)).size;
        }

        function renderChart(data) {
            const c = $('#distributionChart'); if (!c) return;
            const counts = { booking:0, agoda:0, expedia:0, hotels:0, tripadvisor:0 };
            data.forEach(r => counts[r.site]++);
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(c.getContext('2d'), {
                type: 'doughnut',
                data: { labels: Object.values(siteLabels), datasets: [{ data: Object.values(counts), backgroundColor: Object.values(siteColors), borderWidth: 0 }] },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { color: isDarkMode ? '#fff' : '#666', font: { size: 10 } } } }
                }
            });
        }

        // Site Pills multi-select
        $$('.site-pill').forEach(pill => {
            pill.addEventListener('click', () => {
                pill.classList.toggle('active');
                const cb = pill.querySelector('input');
                if (cb) cb.checked = pill.classList.contains('active');
            });
        });

        // Scrape Logic
        function triggerScrape(mode) {
            if (isRunning || !currentHotel) return;
            const sites = []; 
            $$('.site-pill.active').forEach(p => {
                const val = p.querySelector('input')?.value || p.innerText.trim().toLowerCase();
                sites.push(val);
            });
            if (!sites.length) return alert('Select at least one site');
            
            isRunning = true; sessionNewCount = 0;
            const btn = mode === 'all' ? $('#btnScrapeAll') : $('#btnScrapeNew');
            btn.classList.add('running');
            socket.emit('start_scrape', { hotelName: currentHotel, sites, mode, dateFrom: $('#dateFrom').value, dateTo: $('#dateTo').value });
        }
        $('#btnScrapeAll').addEventListener('click', () => triggerScrape('all'));
        $('#btnScrapeNew').addEventListener('click', () => triggerScrape('new'));

        socket.on('new_review', ({ site, review }) => {
            sessionNewCount++; $('#growthCount').textContent = sessionNewCount;
            review.site = site; allReviews.unshift(review);
            renderReviews(allReviews); updateStats(allReviews);
        });

        socket.on('all_done', (state) => { isRunning = false; updateStateUI(state); });
        socket.on('scrape_state', (state) => updateStateUI(state));

        function updateStateUI(state) {
            let h = [];
            for (const [k, v] of Object.entries(state)) {
                if (v.lastScrapedAt) {
                    const d = new Date(v.lastScrapedAt).toLocaleTimeString();
                    h.push(`<strong>${v.siteName}</strong>: ${d} (${v.totalReviews})`);
                }
            }
            $('#lastScrapedInfo').innerHTML = h.join('<br>');
        }
    </script>
</body>
</html>
